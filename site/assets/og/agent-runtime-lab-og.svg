  <text x="84" y="110" fill="#1D6DC0" font-family="IBM Plex Mono, Arial" font-size="24">gemma4-wdc</text>
  <text x="84" y="188" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="58" font-weight="600">Local multi-agent execution</text>
  <text x="84" y="252" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="58" font-weight="600">with middleware-level</text>
  <text x="84" y="316" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="58" font-weight="600">deduplication</text>
  <text x="84" y="388" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="26">Laptop-first prototype for semantic overlap detection, bounded admission windows,</text>
  <text x="84" y="424" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="26">shared execution units, result fan-out, and benchmark-aware observability.</text>

