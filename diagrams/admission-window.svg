<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="620" rx="30" fill="#F6FAFE"/>
  <rect x="34" y="34" width="1332" height="552" rx="28" fill="white" stroke="#D8E2EE" stroke-width="2"/>
  <text x="78" y="104" fill="#1D6DC0" font-family="IBM Plex Mono, Arial" font-size="24">admission-window</text>
  <text x="78" y="156" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="42" font-weight="600">Bounded, non-resetting capture window</text>
  <text x="78" y="196" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="22">The first task opens the window. Matching tasks attach. The deadline does not move.</text>

  <line x1="122" y1="356" x2="1260" y2="356" stroke="#B7C7D9" stroke-width="4" stroke-linecap="round"/>
  <rect x="222" y="308" width="520" height="96" rx="22" fill="#EAF3FF" stroke="#BFD7F4" stroke-width="2"/>
  <text x="252" y="364" fill="#1D6DC0" font-family="IBM Plex Sans, Arial" font-size="30" font-weight="600">admission window open</text>

  <circle cx="222" cy="356" r="14" fill="#1D6DC0"/>
  <text x="184" y="452" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="24" font-weight="600">task 1 arrives</text>
  <text x="146" y="484" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="18">representative task starts timer</text>

  <circle cx="396" cy="356" r="12" fill="#F0B13E"/>
  <text x="356" y="260" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="24" font-weight="600">task 2 matches</text>
  <text x="338" y="290" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="18">subscriber attaches</text>
  <path d="M396 306V338" stroke="#F0B13E" stroke-width="4" stroke-linecap="round"/>

  <circle cx="566" cy="356" r="12" fill="#F0B13E"/>
  <text x="528" y="260" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="24" font-weight="600">task 3 matches</text>
  <text x="510" y="290" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="18">deadline does not reset</text>
  <path d="M566 306V338" stroke="#F0B13E" stroke-width="4" stroke-linecap="round"/>

  <circle cx="742" cy="356" r="14" fill="#1D6DC0"/>
  <text x="690" y="452" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="24" font-weight="600">window expires</text>
  <text x="676" y="484" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="18">shared execution begins</text>

  <rect x="836" y="308" width="160" height="96" rx="22" fill="#E8F5EC" stroke="#B7DDBF" stroke-width="2"/>
  <text x="874" y="364" fill="#1D7B54" font-family="IBM Plex Sans, Arial" font-size="28" font-weight="600">execute once</text>

  <rect x="1060" y="296" width="212" height="120" rx="22" fill="#F8FBFF" stroke="#D7E1ED" stroke-width="2"/>
  <text x="1090" y="344" fill="#102033" font-family="IBM Plex Sans, Arial" font-size="28" font-weight="600">result fan-out</text>
  <text x="1090" y="380" fill="#5C7087" font-family="IBM Plex Sans, Arial" font-size="18">all subscribers receive one result</text>

  <path d="M742 356H836" stroke="#1D6DC0" stroke-width="5" stroke-linecap="round"/>
  <path d="M996 356H1060" stroke="#1D6DC0" stroke-width="5" stroke-linecap="round"/>
</svg>
